# =============================================================================
# Casbin model ‚Äî the *shape* of NIS authorization (read together with
# casbin_policy.csv, which contains the *data*).
#
# Casbin is a policy engine. You hand it (subject, object, action) triples and
# it tells you yes/no. This file defines what each of those things is, how
# subjects can inherit from each other, and how a permission check is decided.
#
# Quick mental model:
#
#   request   = "user X wants to perform action Y on resource Z"
#   policy    = "role R is allowed to perform action Y on resource Z"
#   role_link = "user X has role R"   (here we don't use it ‚Äî see below)
#   matcher   = the boolean expression Casbin evaluates per policy line to
#               decide if it grants the request
#
# In NIS we keep the model deliberately tiny: one matcher, one effect, role
# names equal subject names. The heavy lifting (per-operator / per-account
# scoping) is done in Go by PermissionService AFTER Casbin has approved the
# coarse role+resource+action grant. See SKILL.md ¬ß"Architectural concerns:
# Authorization is implemented twice" for why it's split.
# =============================================================================


# -----------------------------------------------------------------------------
# request_definition ‚Äî what a permission *request* looks like at runtime.
#
# When the AuthInterceptor middleware checks an RPC call it passes three
# strings to Casbin:
#   sub  ‚Äî the caller's role  ("admin", "operator-admin", or "account-admin")
#   obj  ‚Äî the resource type  ("operator", "account", "user", "cluster", ...)
#   act  ‚Äî the verb           ("create", "read", "update", "delete", "sync", ...)
#
# Naming `r` (request) and listing the field names lets the matcher refer to
# them as `r.sub`, `r.obj`, `r.act` below.
# -----------------------------------------------------------------------------
[request_definition]
r = sub, obj, act


# -----------------------------------------------------------------------------
# policy_definition ‚Äî what each line in casbin_policy.csv looks like.
#
# A line `p, admin, operator, create` says
#   subject "admin" is allowed to perform action "create" on resource "operator"
#
# Same shape as the request ‚Äî that's intentional: it makes the matcher trivial
# (sub == sub, obj == obj, act == act). A more sophisticated model could add
# fields like `tenant_id`, but we don't.
# -----------------------------------------------------------------------------
[policy_definition]
p = sub, obj, act


# -----------------------------------------------------------------------------
# role_definition ‚Äî role-to-role inheritance ("g" is RBAC's grouping operator).
#
# `g = _, _` declares a generic two-argument role mapping: `g, alice, admin`
# in the policy file would mean "alice has role admin".
#
# We DON'T currently use any `g` rules ‚Äî every API user already has a role
# stored on their row in the api_users table, and the middleware passes that
# role directly as `r.sub`. The definition stays here in case we ever want to
# layer (e.g.) "operator-admin inherits read-only account-admin permissions".
# -----------------------------------------------------------------------------
[role_definition]
g = _, _


# -----------------------------------------------------------------------------
# policy_effect ‚Äî how to combine multiple matching policies.
#
# `some(where (p.eft == allow))` means: the request is granted if AT LEAST ONE
# matching policy says "allow". Policies in casbin_policy.csv don't carry an
# explicit effect, so each row is treated as `eft = allow` by default.
#
# Translation: pure allow-list ‚Äî if no matching `p` row exists for the
# (role, resource, action) triple, the request is denied.
# -----------------------------------------------------------------------------
[policy_effect]
e = some(where (p.eft == allow))


# -----------------------------------------------------------------------------
# matchers ‚Äî boolean expression Casbin evaluates per policy line.
#
# For a request `r` and a policy line `p`:
#   g(r.sub, p.sub)  ‚Äî is r.sub the same role as p.sub (or inherits from it)?
#                      With no `g` rules, this is just string equality.
#   r.obj == p.obj   ‚Äî same resource type?
#   r.act == p.act   ‚Äî same action?
#
# All three must be true ‚Üí policy_effect kicks in ‚Üí request allowed.
# -----------------------------------------------------------------------------
[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act
